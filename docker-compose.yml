services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Redis para cache e rate limiting (Opcional no início, mas bom para performance)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
