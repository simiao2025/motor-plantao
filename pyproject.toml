[tool.ruff]
# Excluir diretórios comuns
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Comprimento de linha padrão
line-length = 88
indent-width = 4

target-version = "py313"

[tool.ruff.lint]
# Habilitar regras recomendadas (E, F, W, I, N, UP, B)
select = ["E", "F", "W", "I", "N", "UP", "B", "S", "T20"]
ignore = []

# Permitir fix automático
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
